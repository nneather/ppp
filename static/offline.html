<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#ffffff" />
		<title>Offline — ppp</title>
		<style>
			:root {
				color-scheme: light;
				--background: #ffffff;
				--foreground: #18181b;
				--muted: #71717a;
				--border: #e4e4e7;
				--card: #ffffff;
				--primary: #18181b;
				--primary-fg: #fafafa;
			}
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				min-height: 100dvh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 1.5rem;
				font-family:
					ui-sans-serif,
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					sans-serif;
				background: var(--background);
				color: var(--foreground);
				-webkit-font-smoothing: antialiased;
			}
			main {
				width: 100%;
				max-width: 24rem;
				text-align: center;
			}
			.eyebrow {
				font-size: 0.875rem;
				font-weight: 600;
				letter-spacing: 0.05em;
				text-transform: uppercase;
				color: var(--muted);
			}
			h1 {
				margin: 0.5rem 0 0;
				font-size: 1.5rem;
				font-weight: 600;
				letter-spacing: -0.02em;
				line-height: 1.25;
			}
			p {
				margin: 0.75rem 0 0;
				font-size: 0.875rem;
				line-height: 1.5;
				color: var(--muted);
			}
			button {
				margin-top: 1.5rem;
				padding: 0.5rem 1rem;
				border: 1px solid var(--border);
				border-radius: 0.5rem;
				background: var(--primary);
				color: var(--primary-fg);
				font-size: 0.875rem;
				font-weight: 500;
				cursor: pointer;
			}
			button:focus-visible {
				outline: 2px solid #a1a1aa;
				outline-offset: 2px;
			}
		</style>
	</head>
	<body>
		<main>
			<p class="eyebrow">Offline</p>
			<h1>You're offline</h1>
			<p>ppp needs a network connection. Check your connection and try again.</p>
			<button type="button" onclick="window.location.reload()">Try again</button>
		</main>
	</body>
</html>
